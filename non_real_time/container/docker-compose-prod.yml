services:
  Hexapod:
    image: hexapod:latest
    container_name: hexapod_latest
    network_mode: host
    volumes:
      - ./src:/app/src
      - /var/run/dbus/:/var/run/dbus/:z
      - /dev/ttyAMA0:/dev/ttyAMA0:rw
      - /dev/input/:/dev/input/
    privileged: true
    entrypoint: ["bash", "/app/src/entry_point.sh"]
    restart: always