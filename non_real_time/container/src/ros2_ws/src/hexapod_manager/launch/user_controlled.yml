launch:
  - include:
      file: $(find-pkg-share control)/xbox.yml

  - node:
      pkg: gait
      exec: teensy_gait
      name: teensy_gait

  - node:
      pkg: hexapod_manager
      exec: led_controller
      name: led_controller

  - node:
      pkg: hexapod_manager
      exec: display
      name: display

  - node:
      pkg: hexapod_manager
      exec: status_reporter
      name: status_reporter